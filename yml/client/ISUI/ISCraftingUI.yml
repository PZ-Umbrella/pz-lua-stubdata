version: "1.1"
languages:
  lua:
    classes:
      ISCraftingUI:
        extends: ISCollapsableWindow
        staticMethods:
          - name: ReturnItemsToOriginalContainer
            parameters:
              - name: playerObj
                type: IsoPlayer
              - name: items
                type: InventoryItem[]
          - name: ReturnItemToOriginalContainer
            parameters:
              - name: playerObj
                type: IsoPlayer
              - name: item
                type: InventoryItem
                nullable: true
          - name: ReturnItemToContainer
            parameters:
              - name: playerObj
                type: IsoPlayer
              - name: item
                type: InventoryItem
                nullable: true
              - name: cont
                type: ItemContainer
                nullable: true
      umbrella.ISCraftingUI.IngredientItem:
        fields:
          name:
            type: string
          available:
            type: boolean
          texture:
            type: Texture
          item:
            type: InventoryItem
          baseItem:
            type: Item
          recipe:
            type: Recipe
          poison:
            type: boolean
      umbrella.ISCraftingUI.RecipeItem:
        fields:
          recipe:
            type: Recipe | EvolvedRecipe
          category:
            type: string
            nullable: true
          sources:
            type: "{ items: umbrella.ISCraftingUI.RecipeSourceItem[] }[]"
            nullable: true
          available:
            type: boolean
            nullable: true
          favorite:
            type: boolean
            nullable: true
          texture:
            type: Texture
            nullable: true
          itemName:
            type: string
            nullable: true
          typesAvailable:
            type: table<string, integer>
            nullable: true
          baseItem:
            type: Item
            nullable: true
          resultName:
            type: string
            nullable: true
          items:
            type: umbrella.ISCraftingUI.RecipesListIngredientItem[]
            nullable: true
          evolved:
            type: boolean
            nullable: true
          customRecipeName:
            type: string
            nullable: true
          extraItems:
            type: Item[]
            nullable: true
      umbrella.ISCraftingUI.RecipesListIngredientItem:
        fields:
          name:
            type: string
          available:
            type: boolean
          texture:
            type: Texture
          fullType:
            type: string
            nullable: true
          itemToAdd:
            type: InventoryItem
            nullable: true
          poison:
            type: boolean
            nullable: true
      umbrella.ISCraftingUI.RecipeSourceItem:
        fields:
          name:
            type: string
          count:
            type: number
          texture:
            type: Texture
          fullType:
            type: string
          fluidFullType:
            type: string
            nullable: true
          color:
            type: Color
            nullable: true
      umbrella.ISCraftingUI.RecipeSourceItemData:
        extends: umbrella.ISCraftingUI.RecipeSourceItem
        fields:
          selectedItem:
            type: umbrella.ISCraftingUI.RecipeItem
          multiple:
            type: boolean
