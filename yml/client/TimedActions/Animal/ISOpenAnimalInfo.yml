version: "1.1"
languages:
  lua:
    classes:
      ISOpenAnimalInfo:
        extends: ISBaseTimedAction
        constructors:
          - parameters:
              - name: character
                type: IsoPlayer
              - name: animal
                type: IsoAnimal
              - name: prevFocus
                type: ISUIElement
        staticFields:
          Type:
            defaultValue: '"ISOpenAnimalInfo"'
        fields:
          animal:
            type: IsoAnimal
          player:
            type: IsoPlayer
          playerNum:
            type: integer
          useProgressBar:
            type: boolean
          prevFocus:
            type: table
        methods:
          - name: isValid
            return:
              - type: boolean
          - name: waitToStart
            return:
              - type: boolean
          - name: update
          - name: start
          - name: forceStop
          - name: stop
          - name: perform
          - name: getDuration
            return:
              - type: number
          - name: serverStart
          - name: animEvent
            parameters:
              - name: event
                type: string
              - name: parameter
                type: string
