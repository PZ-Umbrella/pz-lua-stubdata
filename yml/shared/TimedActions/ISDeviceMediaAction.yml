version: "1.1"
languages:
  lua:
    classes:
      ISDeviceMediaAction:
        extends: ISBaseTimedAction
        constructors:
          - parameters:
              - name: character
                type: IsoPlayer
              - name: isRemove
                type: boolean
              - name: secondaryItem
                type: InventoryItem
                nullable: true
              - name: parameter
                type: integer | IsoGridSquare
                nullable: true
        staticFields:
          Type:
            defaultValue: '"ISDeviceMediaAction"'
        fields:
          ignoreHandsWounds:
            type: boolean
          isRemove:
            type: boolean
          secondaryItem:
            type: InventoryItem
            nullable: true
          parameter:
            type: integer | IsoGridSquare
            nullable: true
          deviceData:
            type: DeviceData
            nullable: true
        methods:
          - name: isValid
            return:
              - type: boolean
          - name: complete
            return:
              - type: boolean
          - name: invoke
          - name: getDuration
            return:
              - type: number
