version: "1.1"
languages:
  lua:
    classes:
      ISUnequipAction:
        extends: ISBaseTimedAction
        constructors:
          - parameters:
              - name: character
                type: IsoPlayer
              - name: item
                type: InventoryItem
              - name: maxTimeInit
                type: number
        staticFields:
          Type:
            defaultValue: '"ISUnequipAction"'
        fields:
          sound:
            type: integer
            nullable: true
          soundNoTrigger:
            type: boolean
          item:
            type: InventoryItem
          maxTimeInit:
            type: number
          ignoreHandsWounds:
            type: boolean
          clothingAction:
            type: boolean
          hotbar:
            type: ISHotbar
            nullable: true
          fromHotbar:
            type: boolean
            nullable: true
          animSpeed:
            type: number
        methods:
          - name: isValid
            return:
              - type: boolean
          - name: update
          - name: start
          - name: stop
          - name: animEvent
            parameters:
              - name: event
                type: string
              - name: parameter
                type: string
          - name: perform
          - name: complete
            return:
              - type: boolean
          - name: getDuration
            return:
              - type: number
