version: "1.1"
languages:
  lua:
    classes:
      ISShovelAction:
        extends: ISBaseTimedAction
        constructors:
          - parameters:
              - name: character
                type: IsoPlayer
              - name: item
                type: InventoryItem
              - name: plant
                type: CPlantGlobalObject
              - name: maxTimeInit
                type: number
        staticFields:
          Type:
            defaultValue: '"ISShovelAction"'
        fields:
          sound:
            type: integer
            nullable: true
          plant:
            type: CPlantGlobalObject
          character:
            type: IsoPlayer
          item:
            type: InventoryItem
          maxTimeInit:
            type: number
        methods:
          - name: isValid
            return:
              - type: boolean
          - name: waitToStart
            return:
              - type: boolean
          - name: update
          - name: start
          - name: stop
          - name: perform
          - name: complete
            return:
              - type: boolean
          - name: getDuration
            return:
              - type: number
